apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentic-workspace.webName" . }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "agentic-workspace.webName" . }}
  template:
    metadata:
      labels:
        app: {{ include "agentic-workspace.webName" . }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.service.targetPort }}
          envFrom:
            - configMapRef:
                name: {{ include "agentic-workspace.configMapName" . }}
            - secretRef:
                name: {{ include "agentic-workspace.secretName" . }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: {{ .Values.web.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.web.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: {{ .Values.web.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.web.livenessProbe.periodSeconds }}
          resources:
{{ toYaml .Values.web.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentic-workspace.webName" . }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ include "agentic-workspace.webName" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.web.service.port }}
      targetPort: {{ .Values.web.service.targetPort }}
  type: {{ .Values.web.service.type }}
{{- if .Values.web.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agentic-workspace.webName" . }}
  namespace: {{ .Values.namespace }}
  {{- with .Values.web.ingress.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  {{- if .Values.web.ingress.className }}
  ingressClassName: {{ .Values.web.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.web.ingress.host }}
      http:
        paths:
          - path: {{ .Values.web.ingress.path }}
            pathType: {{ .Values.web.ingress.pathType }}
            backend:
              service:
                name: {{ include "agentic-workspace.webName" . }}
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}
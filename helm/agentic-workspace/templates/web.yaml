apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentic-workspace.webName" . }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "agentic-workspace.webName" . }}
  template:
    metadata:
      labels:
        app: {{ include "agentic-workspace.webName" . }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.service.targetPort }}
          env:
            - name: NEXTAUTH_URL
              value: {{ printf "https://%s" .Values.web.ingress.host | quote }}
            - name: AUTH_URL
              value: {{ printf "https://%s" .Values.web.ingress.host | quote }}
            - name: AUTH_TRUST_HOST
              value: "true"
            - name: AUTH_MICROSOFT_ENTRA_ID_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentic-workspace.secretName" . }}
                  key: AZURE_CLIENT_ID
                  optional: true
            - name: AUTH_MICROSOFT_ENTRA_ID_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentic-workspace.secretName" . }}
                  key: AZURE_CLIENT_SECRET
                  optional: true
            - name: AUTH_MICROSOFT_ENTRA_ID_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentic-workspace.secretName" . }}
                  key: AZURE_TENANT_ID
                  optional: true
          envFrom:
            - configMapRef:
                name: {{ include "agentic-workspace.configMapName" . }}
            - secretRef:
                name: {{ include "agentic-workspace.secretName" . }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: {{ .Values.web.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.web.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: {{ .Values.web.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.web.livenessProbe.periodSeconds }}
          resources:
{{ toYaml .Values.web.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentic-workspace.webName" . }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ include "agentic-workspace.webName" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.web.service.port }}
      targetPort: {{ .Values.web.service.targetPort }}
  type: {{ .Values.web.service.type }}
{{- if .Values.web.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agentic-workspace.webName" . }}
  namespace: {{ .Values.namespace }}
  {{- $issuerName := .Values.web.ingress.tls.issuer | default "letsencrypt-prod" }}
  {{- $issuerKind := .Values.web.ingress.tls.issuerKind | default "ClusterIssuer" }}
  annotations:
  {{- if .Values.web.ingress.className }}
    kubernetes.io/ingress.class: {{ .Values.web.ingress.className | quote }}
  {{- end }}
  {{- if and .Values.web.ingress.tls.enabled $issuerName }}
    {{- if eq $issuerKind "Issuer" }}
    cert-manager.io/issuer: {{ $issuerName }}
    {{- else }}
    cert-manager.io/cluster-issuer: {{ $issuerName }}
    {{- end }}
  {{- end }}
  {{- with .Values.web.ingress.annotations }}
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  {{- if .Values.web.ingress.className }}
  ingressClassName: {{ .Values.web.ingress.className }}
  {{- end }}
  {{- if .Values.web.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.web.ingress.host }}
      secretName: {{ .Values.web.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.web.ingress.host }}
      http:
        paths:
          - path: {{ .Values.web.ingress.path }}
            pathType: {{ .Values.web.ingress.pathType }}
            backend:
              service:
                name: {{ include "agentic-workspace.webName" . }}
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}
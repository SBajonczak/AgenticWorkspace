{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentic-workspace.secretName" . }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secret.data.DATABASE_URL | quote }}
  NEXTAUTH_SECRET: {{ .Values.secret.data.NEXTAUTH_SECRET | quote }}
  NEXTAUTH_URL: {{ .Values.secret.data.NEXTAUTH_URL | quote }}
  AUTH_MICROSOFT_ENTRA_ID_ID: {{ .Values.secret.data.AUTH_MICROSOFT_ENTRA_ID_ID | quote }}
  AUTH_MICROSOFT_ENTRA_ID_SECRET: {{ .Values.secret.data.AUTH_MICROSOFT_ENTRA_ID_SECRET | quote }}
  AZURE_OPENAI_API_KEY: {{ .Values.secret.data.AZURE_OPENAI_API_KEY | quote }}
  AZURE_OPENAI_ENDPOINT: {{ .Values.secret.data.AZURE_OPENAI_ENDPOINT | quote }}
  AZURE_OPENAI_DEPLOYMENT: {{ .Values.secret.data.AZURE_OPENAI_DEPLOYMENT | quote }}
  JIRA_HOST: {{ .Values.secret.data.JIRA_HOST | quote }}
  JIRA_EMAIL: {{ .Values.secret.data.JIRA_EMAIL | quote }}
  JIRA_API_TOKEN: {{ .Values.secret.data.JIRA_API_TOKEN | quote }}
  JIRA_PROJECT_KEY: {{ .Values.secret.data.JIRA_PROJECT_KEY | quote }}
{{- end }}
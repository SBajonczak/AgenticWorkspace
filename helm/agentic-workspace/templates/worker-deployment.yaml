{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentic-workspace.workerName" . }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "agentic-workspace.workerName" . }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include "agentic-workspace.configChecksum" . | quote }}
        checksum/secret: {{ include "agentic-workspace.secretChecksum" . | quote }}
      labels:
        app: {{ include "agentic-workspace.workerName" . }}
    spec:
      restartPolicy: {{ .Values.worker.restartPolicy }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command:
{{ toYaml .Values.worker.command | indent 12 }}
          env:
            - name: USE_MULTI_AGENT_PIPELINE
              value: {{ .Values.config.useMultiAgentPipeline | default "true" | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "agentic-workspace.configMapName" . }}
            - secretRef:
                name: {{ include "agentic-workspace.secretName" . }}
          resources:
{{ toYaml .Values.worker.resources | indent 12 }}
{{- end }}

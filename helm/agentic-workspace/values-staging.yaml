namespace: agentic-staging

config:
  nodeEnv: production
  dryRun: "false"

web:
  ingress:
    enabled: true
    className: nginx
    host: workplace-staging.realapps.org
    annotations:
      nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"
      nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
      nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "64k"
    tls:
      enabled: true
      secretName: workplace-staging-realapps-org-tls
      issuer: letsencrypt-prod
      issuerKind: ClusterIssuer

worker:
  replicaCount: 1
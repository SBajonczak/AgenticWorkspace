namespace: agentic-staging

config:
  nodeEnv: production

web:
  ingress:
    enabled: true
    className: nginx
    host: workplace-staging.realapps.org
    tls:
      enabled: true
      secretName: workplace-staging-realapps-org-tls
      issuer: letsencrypt-staging
      issuerKind: ClusterIssuer

worker:
  replicaCount: 1
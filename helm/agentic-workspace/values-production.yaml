namespace: agentic-production

config:
  nodeEnv: production

web:
  ingress:
    enabled: true
    className: nginx
    host: workplace.realapps.org
    tls:
      enabled: true
      secretName: workplace-realapps-org-tls
      issuer: letsencrypt-prod
      issuerKind: ClusterIssuer

worker:
  replicaCount: 1
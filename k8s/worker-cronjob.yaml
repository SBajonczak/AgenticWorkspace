apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-worker
  namespace: agentic-workspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentic-worker
  template:
    metadata:
      labels:
        app: agentic-worker
    spec:
      restartPolicy: Always
      containers:
        - name: worker
          image: REPLACE_WITH_ACR_IMAGE
          imagePullPolicy: Always
          command:
            - npm
            - run
            - worker
          envFrom:
            - configMapRef:
                name: agentic-config
            - secretRef:
                name: agentic-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"

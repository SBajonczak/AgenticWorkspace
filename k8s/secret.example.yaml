apiVersion: v1
kind: Secret
metadata:
  name: agentic-secrets
  namespace: agentic-workspace
type: Opaque
stringData:
  DATABASE_URL: "sqlserver://<server>.database.windows.net:1433;database=<db>;user=<user>;password=<password>;encrypt=true;trustServerCertificate=false;"
  NEXTAUTH_SECRET: "replace-me"
  NEXTAUTH_URL: "https://agentic.example.com"
  AUTH_MICROSOFT_ENTRA_ID_ID: "replace-me"
  AUTH_MICROSOFT_ENTRA_ID_SECRET: "replace-me"
  AZURE_OPENAI_API_KEY: "replace-me"
  AZURE_OPENAI_ENDPOINT: "https://<resource>.openai.azure.com"
  AZURE_OPENAI_DEPLOYMENT: "gpt-4o-mini"
  JIRA_HOST: "https://your-domain.atlassian.net"
  JIRA_EMAIL: "you@example.com"
  JIRA_API_TOKEN: "replace-me"
  JIRA_PROJECT_KEY: "PROJ"

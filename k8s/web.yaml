apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-web
  namespace: agentic-workspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentic-web
  template:
    metadata:
      labels:
        app: agentic-web
    spec:
      containers:
        - name: web
          image: REPLACE_WITH_ACR_IMAGE
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: agentic-config
            - secretRef:
                name: agentic-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: agentic-web
  namespace: agentic-workspace
spec:
  selector:
    app: agentic-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentic-web
  namespace: agentic-workspace
spec:
  rules:
    - host: agentic.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentic-web
                port:
                  number: 80
